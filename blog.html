<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог | Code & Sound</title>
    <style>
        body {
            background: #0f1115;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .post {
            background: #1a1d24;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .post h2 a {
            color: #00ff9d;
            text-decoration: none;
        }
        .post h2 a:hover {
            text-decoration: underline;
        }
        .post-meta {
            color: #8b9bb4;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>📝 Блог</h1>
    <div id="posts-list">Загрузка постов...</div>

    <script type="module">
        // Простой скрипт для загрузки постов из папки posts/
        // Примечание: для работы нужен доступ к GitHub API
        
        async function loadPosts() {
            const postsContainer = document.getElementById('posts-list');
            
            // Заглушка: покажем список файлов вручную
            // В реальном проекте здесь будет запрос к GitHub API
            postsContainer.innerHTML = `
                <div class="post">
                    <h2><a href="#">Тестовая страница</a></h2>
                    <div class="post-meta">12 апреля 2024</div>
                    <p>Это тестовый пост, созданный через Decap CMS.</p>
                    <a href="#">Читать далее →</a>
                </div>
            `;
        }
        
        loadPosts();
    </script>
</body>
</html>
