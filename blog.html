<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог | Code & Sound</title>
    <style>
        body {
            background: #0f1115;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .post {
            background: #1a1d24;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #00ff9d;
            transition: transform 0.3s;
        }
        .post:hover {
            transform: translateY(-3px);
        }
        .post h2 {
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .post h2 a {
            color: #00ff9d;
            text-decoration: none;
            transition: color 0.3s;
        }
        .post h2 a:hover {
            color: #bd00ff;
        }
        .post-meta {
            color: #8b9bb4;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .post-excerpt {
            line-height: 1.8;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        .read-more {
            display: inline-block;
            padding: 10px 25px;
            background: #00ff9d;
            color: #0f1115;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .read-more:hover {
            background: #bd00ff;
            transform: translateX(5px);
        }
        .loading {
            text-align: center;
            color: #8b9bb4;
            padding: 40px;
        }
        a.home-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #bd00ff;
            text-decoration: none;
        }
        a.home-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="/codesound/" class="home-link">← На главную</a>
    <h1>📝 Блог</h1>
    <div id="posts-list" class="loading">Загрузка постов...</div>

    <script>
        // ⚙️ НАСТРОЙКИ
        const GITHUB_USER = 'Alex196314';
        const GITHUB_REPO = 'codesound';
        const POSTS_FOLDER = 'post';
        const BRANCH = 'main';
        const BASE_URL = '/codesound';

        async function loadPosts() {
            const container = document.getElementById('posts-list');
            
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_FOLDER}?ref=${BRANCH}`
                );
                
                if (!response.ok) throw new Error('Не удалось получить список постов');
                
                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));

                if (mdFiles.length === 0) {
                    container.innerHTML = '<p>Пока нет постов. Будь первым!</p>';
                    return;
                }

                container.innerHTML = '';

                for (const file of mdFiles) {
                    const contentResp = await fetch(file.download_url);
                    const content = await contentResp.text();
                    
                    // Парсинг frontmatter
                    const match = content.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                    let title = file.name.replace('.md', '');
                    let date = '';
                    let body = content;
                    
                    if (match) {
                        const meta = match[1];
                        body = match[2];
                        const titleMatch = meta.match(/title:\s*["']?(.+?)["']?$/im);
                        const dateMatch = meta.match(/date:\s*(.+?)$/im);
                        if (titleMatch) title = titleMatch[1];
                        if (dateMatch) date = new Date(dateMatch[1]).toLocaleDateString('ru-RU');
                    }

                    // Создаём краткое описание (первые 250 символов)
                    const cleanText = body.replace(/[#*`\[\]!]/g, '').replace(/\n/g, ' ');
                    const excerpt = cleanText.substring(0, 250) + (cleanText.length > 250 ? '...' : '');

                    // Преобразование Markdown для превью (базовое)
                    const htmlExcerpt = excerpt
                        .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                        .replace(/\*(.*?)\*/gim, '<em>$1</em>');

                    // Ссылка на полный пост
                    const postUrl = `${BASE_URL}/post.html?slug=${file.name.replace('.md', '')}`;

                    // Создаём карточку
                    const postEl = document.createElement('article');
                    postEl.className = 'post';
                    postEl.innerHTML = `
                        <h2><a href="${postUrl}">${title}</a></h2>
                        ${date ? `<div class="post-meta">📅 ${date}</div>` : ''}
                        <div class="post-excerpt">${htmlExcerpt}</div>
                        <a href="${postUrl}" class="read-more">Читать далее →</a>
                    `;
                    container.appendChild(postEl);
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p style="color:#ff6b6b">Ошибка загрузки: ${err.message}<br><small>Проверь настройки в скрипте</small></p>`;
            }
        }

        loadPosts();
    </script>
</body>
</html>
