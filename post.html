<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пост | Code & Sound</title>
    <style>
        body {
            background: #0f1115;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.8;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .post-container {
            background: #1a1d24;
            padding: 40px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #00ff9d;
        }
        h1 {
            color: #00ff9d;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .post-meta {
            color: #8b9bb4;
            font-size: 0.9rem;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .post-content {
            font-size: 1.1rem;
        }
        .post-content h2 { color: #bd00ff; margin-top: 30px; }
        .post-content h3 { color: #00ff9d; margin-top: 25px; }
        .post-content strong { color: #fff; }
        .post-content a { color: #00ff9d; }
        .post-content img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #bd00ff;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 40px; color: #8b9bb4; }
        .error { text-align: center; padding: 40px; color: #ff6b6b; }
        .post-content img {
         max-width: 100%;
         height: auto;
         border-radius: 8px;
         margin: 20px 0;
         display: block;
          }
    </style>
</head>

         margin: 20px 0;
         display: block;
          }

<body>
    <a href="/codesound/blog.html" class="back-link">← Назад к блогу</a>
    <div id="post-content" class="loading">Загрузка поста...</div>

    <script>
        const GITHUB_USER = 'Alex196314';
        const GITHUB_REPO = 'codesound';
        const POSTS_FOLDER = 'post';
        const BRANCH = 'main';
        const BASE_URL = '/codesound';

        async function loadPost() {
            const container = document.getElementById('post-content');
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                container.innerHTML = '<div class="error">Пост не найден</div>';
                return;
            }

            try {
                // Ищем файл по имени
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_FOLDER}/${slug}.md?ref=${BRANCH}`
                );

                if (!response.ok) throw new Error('Пост не найден');

                const file = await response.json();
                const contentResp = await fetch(file.download_url);
                const content = await contentResp.text();

                // Парсим frontmatter
                const match = content.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                let title = slug;
                let date = '';
                let body = content;

                if (match) {
                    const meta = match[1];
                    body = match[2];
                    const titleMatch = meta.match(/title:\s*["']?(.+?)["']?$/im);
                    const dateMatch = meta.match(/date:\s*(.+?)$/im);
                    if (titleMatch) title = titleMatch[1];
                    if (dateMatch) date = new Date(dateMatch[1]).toLocaleDateString('ru-RU');
                }

                // Преобразуем Markdown
                let htmlBody = body
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                    .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                    .replace(/!\[(.*?)\]\((.*?)\)/gim, '<img src="$2" alt="$1">')
                    .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>')
                    .replace(/\n/gim, '<br>');

                // Отображаем пост
                document.title = `${title} | Code & Sound`;
                container.innerHTML = `
                    <article class="post-container">
                        <h1>${title}</h1>
                        ${date ? `<div class="post-meta">📅 Опубликовано: ${date}</div>` : ''}
                        <div class="post-content">${htmlBody}</div>
                    </article>
                `;
            } catch (err) {
                container.innerHTML = `<div class="error">Ошибка: ${err.message}</div>`;
            }
        }

        loadPost();
    </script>
</body>
